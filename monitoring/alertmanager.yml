# ============================================================================
# Alertmanager 설정 - APEX-DB 알림 라우팅
# ============================================================================

global:
  resolve_timeout: 5m

# 알림 라우팅
route:
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 12h
  receiver: 'default'

  routes:
    # Critical 알림 → PagerDuty + Slack
    - match:
        severity: critical
      receiver: 'critical-alerts'
      continue: true

    # Warning 알림 → Slack
    - match:
        severity: warning
      receiver: 'warning-alerts'

    # Info 알림 → 로그만
    - match:
        severity: info
      receiver: 'info-alerts'

# 알림 수신자
receivers:
  # 기본 수신자 (Slack)
  - name: 'default'
    slack_configs:
      - api_url: 'YOUR_SLACK_WEBHOOK_URL'
        channel: '#apex-db-alerts'
        title: 'APEX-DB Alert'
        text: '{{ range .Alerts }}{{ .Annotations.summary }}\n{{ .Annotations.description }}\n{{ end }}'

  # Critical 알림 (PagerDuty + Slack)
  - name: 'critical-alerts'
    pagerduty_configs:
      - service_key: 'YOUR_PAGERDUTY_SERVICE_KEY'
        description: '{{ .GroupLabels.alertname }}'
    slack_configs:
      - api_url: 'YOUR_SLACK_WEBHOOK_URL'
        channel: '#apex-db-critical'
        title: '🚨 CRITICAL: {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.summary }}\n{{ .Annotations.description }}\n{{ end }}'
        color: 'danger'

  # Warning 알림 (Slack)
  - name: 'warning-alerts'
    slack_configs:
      - api_url: 'YOUR_SLACK_WEBHOOK_URL'
        channel: '#apex-db-alerts'
        title: '⚠️ WARNING: {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.summary }}\n{{ .Annotations.description }}\n{{ end }}'
        color: 'warning'

  # Info 알림 (로그만)
  - name: 'info-alerts'
    webhook_configs:
      - url: 'http://localhost:8123/webhook/alert'

# 알림 억제 규칙
inhibit_rules:
  # Critical 알림이 발생하면 Warning 억제
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'cluster']
