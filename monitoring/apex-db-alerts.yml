# ============================================================================
# APEX-DB Prometheus 알림 규칙
# ============================================================================

groups:
  - name: apex-db-alerts
    interval: 30s
    rules:
      # ========== 서버 다운 ==========
      - alert: ApexDBDown
        expr: apex_server_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "APEX-DB is down"
          description: "APEX-DB server has been down for more than 1 minute"

      # ========== 서버 준비 안됨 ==========
      - alert: ApexDBNotReady
        expr: apex_server_ready == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "APEX-DB is not ready"
          description: "APEX-DB has not been ready for 5 minutes"

      # ========== 높은 틱 드롭률 ==========
      - alert: HighTickDropRate
        expr: rate(apex_ticks_dropped_total[5m]) > 1000
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High tick drop rate"
          description: "Dropping {{ $value | humanize }} ticks/sec"

      # ========== 쿼리 처리량 급증 ==========
      - alert: HighQueryRate
        expr: rate(apex_queries_executed_total[5m]) > 100
        for: 5m
        labels:
          severity: info
        annotations:
          summary: "High query rate"
          description: "Processing {{ $value | humanize }} queries/sec"

      # ========== 높은 행 스캔 ==========
      - alert: HighRowScanRate
        expr: rate(apex_rows_scanned_total[5m]) > 10000000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High row scan rate"
          description: "Scanning {{ $value | humanize }} rows/sec - potential slow query"

      # ========== 낮은 인제스션 처리량 ==========
      - alert: LowIngestionRate
        expr: rate(apex_ticks_ingested_total[5m]) < 1000 and apex_server_ready == 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Low ingestion rate"
          description: "Only {{ $value | humanize }} ticks/sec ingested"

      # ========== 디스크 사용량 높음 ==========
      - alert: HighDiskUsage
        expr: (node_filesystem_avail_bytes{mountpoint="/data"} / node_filesystem_size_bytes{mountpoint="/data"}) < 0.2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Low disk space"
          description: "Only {{ $value | humanizePercentage }} disk space remaining"

      # ========== 메모리 사용량 높음 ==========
      - alert: HighMemoryUsage
        expr: (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) < 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage"
          description: "Only {{ $value | humanizePercentage }} memory available"

      # ========== CPU 사용률 높음 ==========
      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 90
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage"
          description: "CPU usage is {{ $value | humanize }}%"
