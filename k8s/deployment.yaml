apiVersion: v1
kind: Namespace
metadata:
  name: apex-db
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: apex-config
  namespace: apex-db
data:
  apex.conf: |
    # APEX-DB Cloud Configuration
    port: 8123
    worker_threads: 8
    analytics_mode: true
    cloud_native: true

    # Storage
    data_dir: /opt/apex-db/data
    hdb_compression: lz4

    # Performance
    query_cache_size: 1000
    parallel_threshold: 100000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: apex-db
  namespace: apex-db
  labels:
    app: apex-db
    version: v1.0.0
spec:
  replicas: 3
  selector:
    matchLabels:
      app: apex-db
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: apex-db
        version: v1.0.0
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8123"
        prometheus.io/path: "/metrics"
    spec:
      affinity:
        # Pod 분산 배치 (같은 노드에 여러 pod 방지)
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - apex-db
              topologyKey: kubernetes.io/hostname
      containers:
      - name: apex-db
        image: your-registry/apex-db:v1.0.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8123
          name: http
          protocol: TCP
        resources:
          requests:
            cpu: "4"
            memory: "16Gi"
          limits:
            cpu: "8"
            memory: "32Gi"
        env:
        - name: APEX_WORKER_THREADS
          value: "8"
        - name: APEX_ANALYTICS_MODE
          value: "true"
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        volumeMounts:
        - name: config
          mountPath: /opt/apex-db/config
          readOnly: true
        - name: data
          mountPath: /opt/apex-db/data
        livenessProbe:
          httpGet:
            path: /health
            port: 8123
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 8123
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 2
          failureThreshold: 2
        lifecycle:
          preStop:
            exec:
              # Graceful shutdown: drain 완료 대기
              command: ["/bin/sh", "-c", "sleep 15"]
      terminationGracePeriodSeconds: 30
      volumes:
      - name: config
        configMap:
          name: apex-config
      - name: data
        persistentVolumeClaim:
          claimName: apex-db-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: apex-db-pvc
  namespace: apex-db
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: gp3  # AWS EBS gp3 (변경 가능: gce-pd-ssd, azure-disk-premium)
  resources:
    requests:
      storage: 500Gi
---
apiVersion: v1
kind: Service
metadata:
  name: apex-db-service
  namespace: apex-db
  labels:
    app: apex-db
spec:
  type: LoadBalancer
  sessionAffinity: ClientIP  # 같은 클라이언트 → 같은 pod
  selector:
    app: apex-db
  ports:
  - port: 8123
    targetPort: 8123
    protocol: TCP
    name: http
---
apiVersion: v1
kind: Service
metadata:
  name: apex-db-headless
  namespace: apex-db
spec:
  clusterIP: None
  selector:
    app: apex-db
  ports:
  - port: 8123
    targetPort: 8123
    name: http
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: apex-db-hpa
  namespace: apex-db
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: apex-db
  minReplicas: 3
  maxReplicas: 10
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300  # 5분 안정화
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
